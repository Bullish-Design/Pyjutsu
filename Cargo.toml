[package]
name = "pyjutsu"
version = "0.38.0"
edition = "2024"
rust-version = "1.89"
publish = false
description = "Thin PyO3 binding to jujutsu's jj-lib engine (the _pyjutsu native extension)."

[lib]
name = "_pyjutsu"
crate-type = ["cdylib"]

[dependencies]
# Hard pin: this exact version is the real API contract. Cargo.lock is committed. Bumping
# jj-lib is a deliberate port + a Pyjutsu minor bump (version contract: pyjutsu 0.38.* <-> jj 0.38).
jj-lib = "=0.38.0"

# `extension-module` is NOT enabled here so that `cargo test` can link libpython; maturin
# turns it on via [tool.maturin] features in pyproject.toml when building the wheel/develop.
pyo3 = { version = "0.24", features = ["abi3-py313"] }
