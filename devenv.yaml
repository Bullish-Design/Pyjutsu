# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  # jujutsu is pinned to 0.38.0 — the exact jj-lib version Pyjutsu binds (Cargo.toml
  # pins `jj-lib = "=0.38.0"`). Differential tests must compare against the CLI of the
  # bound library, so the `jj` binary comes from this dedicated nixpkgs rev (the same pin
  # gitman uses), NOT rolling (which currently ships a newer jj).
  nixpkgs-jj:
    url: github:NixOS/nixpkgs/26eaeac4e409d7b5a6bf6f90a2a2dc223c78d915
  # Provides the exact CPython for `languages.python.version = "3.13"`.
  nixpkgs-python:
    url: github:cachix/nixpkgs-python

# If you're using non-OSS software, you can set allowUnfree to true.
# allowUnfree: true

# If you're willing to use a package that's vulnerable
# permittedInsecurePackages:
#  - "openssl-1.1.1w"

# If you have more than one devenv you can merge them
#imports:
# - ./backend
